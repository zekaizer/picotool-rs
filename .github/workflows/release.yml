name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-linux-android
            os: ubuntu-latest
            android: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Pure-Rust deps (no C), so the Android build only needs the NDK clang linker.
      - name: Configure Android NDK linker
        if: matrix.android
        run: |
          toolchain="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$toolchain/aarch64-linux-android21-clang" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name }}"
          name="picotool-rs-${tag}-${{ matrix.target }}"
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${name}.tar.gz" picotool-rs

      - name: Upload artifact to release
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.tar.gz --clobber
        env:
          GH_TOKEN: ${{ github.token }}
